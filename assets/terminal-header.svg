<svg width="800" height="230" viewBox="0 0 800 230" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="799" height="229" rx="10" fill="url(#bg)" stroke="#21262d" stroke-width="1"/>

  <!-- title bar -->
  <path d="M0.5 10 a10 10 0 0 1 10 -9.5 h778 a10 10 0 0 1 10 9.5 v22 h-798 z" fill="#161b22"/>
  <line x1="0.5" y1="32.5" x2="799.5" y2="32.5" stroke="#21262d" stroke-width="1"/>

  <!-- traffic lights -->
  <circle cx="22" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="16" r="6" fill="#27c93f"/>

  <text x="400" y="20" text-anchor="middle" font-size="12" fill="#8b949e">gowtham@systems:~</text>

  <!-- terminal body -->
  <g filter="url(#glow)" font-size="15">
    <text x="24" y="62"><tspan fill="#FFB000">$</tspan><tspan fill="#c9d1d9"> whoami</tspan></text>
    <text x="24" y="90"><tspan fill="#3fb950">&gt;</tspan><tspan fill="#9da7b3"> backend engineer, self-taught, building distributed systems from scratch</tspan></text>

    <text x="24" y="130"><tspan fill="#FFB000">$</tspan><tspan fill="#c9d1d9"> cat current_focus.txt</tspan></text>
    <text x="24" y="158"><tspan fill="#3fb950">&gt;</tspan><tspan fill="#9da7b3"> mini-kafka phase 2, java/spring, ai-native architecture</tspan></text>

    <text x="24" y="198"><tspan fill="#FFB000">$</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#c9d1d9" id="cursor">_</tspan></text>
  </g>

  <animate xlink:href="#cursor" attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
</svg>
